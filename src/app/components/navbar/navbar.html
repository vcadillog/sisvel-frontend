<!-- Navbar - altura fija -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container-fluid px-4">
    <!-- Logo -->
    <a class="navbar-brand fw-bold" routerLink="/dashboard">
      <i class="bi bi-box-seam text-primary me-2"></i>
      SISVEL
    </a>

    <!-- Botón Toggle -->
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menú -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/ventas" routerLinkActive="active">
            <i class="bi bi-bar-chart me-1"></i>Ventas
          </a>
        </li>
      </ul>

      <!-- Perfil y Cerrar Sesión -->
      <div class="d-flex align-items-center gap-2">
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm border-0 dropdown-toggle d-flex align-items-center gap-2"
                  type="button" data-bs-toggle="dropdown">
            <div class="avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center">
              {{ currentUser?.nombre?.charAt(0) || 'U' }}{{ currentUser?.apellido?.charAt(0) || '' }}
            </div>
            <span class="d-none d-md-inline">{{ nombreCompleto }}</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li><span class="dropdown-item-text fw-bold small text-primary">{{ rol }}</span></li>
            <li><hr class="dropdown-divider"></li>
            <li><button class="dropdown-item text-danger" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </button></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Contenedor del contenido - Ocupa el resto de la pantalla -->
<div class="content-container">
  <router-outlet></router-outlet>
</div>
